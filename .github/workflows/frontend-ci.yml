name: Frontend CI

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL_STAGING }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL_STAGING }}

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: |
          test -n "$NEXT_PUBLIC_BACKEND_URL" || (echo "NEXT_PUBLIC_BACKEND_URL_STAGING is not set in GitHub Actions variables" && exit 1)
          test -n "$NEXT_PUBLIC_APP_URL" || (echo "NEXT_PUBLIC_APP_URL_STAGING is not set in GitHub Actions variables" && exit 1)
      - run: npm run build
      - run: |
          npm run start -- --port 3100 > frontend-smoke.log 2>&1 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3100/login >/dev/null; then
              FRONTEND_SMOKE_URL=http://127.0.0.1:3100 npm run smoke
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          cat frontend-smoke.log || true
          exit 1
